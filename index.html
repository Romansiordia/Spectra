<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra Pro - Plataforma Quimiométrica NIR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" crossorigin="anonymous"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#e0f2fe',
                            100: '#bae6fd',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7', 
                        },
                        ui: {
                            darkest: '#040d1a', // Sidebar, inner inputs, deepest background
                            dark: '#123c6d', // Main background
                            card: '#0b203b', // Card background
                            border: 'rgba(255, 255, 255, 0.12)', // Borders
                            accent: '#00d2ff', // Cyan vibrant accent
                            success: '#22c55e',
                            warning: '#f59e0b',
                        },
                        slate: {
                            50: '#f8fafc', // Main Background
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1', // Borders
                            600: '#475569', // Subtitles
                            800: '#1e293b', // Main Text
                            900: '#0f172a', // Chart Backgrounds
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
                        'card': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'inner-dark': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.6)',
                    }
                }
            }
        }
        
        // Initialize Chart.js defaults
        if (typeof Chart !== 'undefined') {
            Chart.defaults.font.family = 'Inter';
            // Register zoom plugin globally if available
            if (typeof ChartZoom !== 'undefined') {
                Chart.register(ChartZoom);
            }
        }

        // Catch and prevent ResizeObserver loop errors from bubbling up to crash the application
        window.addEventListener('error', (e) => {
            if (e.message && (
                e.message.indexOf('ResizeObserver') !== -1 ||
                e.message.indexOf('ResizeObserver loop limit exceeded') !== -1 ||
                e.message.indexOf('ResizeObserver loop completed with undelivered notifications') !== -1
            )) {
                e.stopImmediatePropagation();
                e.preventDefault();
            }
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #154884 0%, #0a2548 100%);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #061427; 
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00d2ff; 
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.12) #061427;
        }

        .shadow-glow {
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-slate-100 antialiased selection:bg-ui-accent selection:text-ui-darkest">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
